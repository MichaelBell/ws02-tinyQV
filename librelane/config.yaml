meta:
  version: 3
  flow: Chip
  substituting_steps:

    # Render the layout after sealring insertion
    KLayout.Render: null
    +KLayout.SealRing: KLayout.Render

    # Disable KLayout DRC
    #KLayout.DRC: null
    #Checker.KLayoutDRC: null

    # Disable KLayout antenna check
    #KLayout.Antenna: null
    #Checker.KLayoutAntenna: null

    # Disable KLayout density check
    #KLayout.Density: null
    #Checker.KLayoutDensity: null

    # Save time during development
    # Enable for sign-off
    #OpenROAD.IRDropReport: null
    #Magic.DRC: null
    #Checker.MagicDRC: null
    #KLayout.XOR: null
    #Checker.XOR: null
    #Netgen.LVS: null
    #Checker.LVS: null

